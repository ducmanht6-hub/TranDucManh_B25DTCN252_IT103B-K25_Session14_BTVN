<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>Danh Sách Sản Phẩm Chợ Tết</h1>

    <form id="product-form">
        <input type="text" id="product-name" placeholder="Tên sản phẩm">
        <input type="number" id="product-price" placeholder="Giá (VND)">
        <button type="submit">Thêm Sản Phẩm</button>
    </form>

    <input type="text" id="search-input" placeholder="Tìm sản phẩm...">

    <ul id="product-list"></ul>

    <div class="sort-controls">
        <button id="sort-asc">Sắp xếp giá: Thấp > Cao</button>
        <button id="sort-desc">Sắp xếp giá: Cao > Thấp</button>
    </div>

    <script src="./btvn01-6.js"></script>
</body>

</html>
